<div class="auth-container">
    <div class="glass-panel auth-panel">
        <h1 class="auth-logo logo-gradient-text">Reset Password</h1>
        <p class="auth-subtitle" *ngIf="step !== 4">Use OTP verification to reset your account password.</p>

        <div *ngIf="error" class="auth-alert error-alert">
            {{ error }}
        </div>

        <div *ngIf="message" class="auth-alert success-alert">
            {{ message }}
        </div>

        <form *ngIf="step === 1" (ngSubmit)="requestOtp($event)" class="auth-form">
            <input
                type="email"
                name="email"
                placeholder="Registered Email"
                class="auth-input"
                [(ngModel)]="email"
                required
            />
            <button type="submit" class="auth-btn" [disabled]="loading">
                {{ loading ? 'Sending OTP...' : 'Send OTP' }}
            </button>
        </form>

        <form *ngIf="step === 2" (ngSubmit)="verifyOtp($event)" class="auth-form">
            <input
                type="email"
                name="emailPreview"
                class="auth-input"
                [value]="email"
                disabled
            />
            <input
                type="text"
                name="otp"
                placeholder="Enter 6-digit OTP"
                class="auth-input"
                [(ngModel)]="otp"
                maxlength="6"
                required
            />
            <button type="submit" class="auth-btn" [disabled]="loading">
                {{ loading ? 'Verifying...' : 'Verify OTP' }}
            </button>
            <button type="button" class="auth-btn secondary-btn" [disabled]="loading" (click)="requestOtp()">
                Resend OTP
            </button>
        </form>

        <form *ngIf="step === 3" (ngSubmit)="resetPassword($event)" class="auth-form">
            <div class="password-wrap">
                <input
                    [type]="showNewPassword ? 'text' : 'password'"
                    name="newPassword"
                    placeholder="New Password (min 8 chars)"
                    class="auth-input"
                    [(ngModel)]="newPassword"
                    required
                />
                <button type="button" class="password-toggle" (click)="showNewPassword = !showNewPassword">
                    {{ showNewPassword ? '??' : '??' }}
                </button>
            </div>
            <div class="password-wrap">
                <input
                    [type]="showConfirmPassword ? 'text' : 'password'"
                    name="confirmPassword"
                    placeholder="Confirm New Password"
                    class="auth-input"
                    [(ngModel)]="confirmPassword"
                    required
                />
                <button type="button" class="password-toggle" (click)="showConfirmPassword = !showConfirmPassword">
                    {{ showConfirmPassword ? '??' : '??' }}
                </button>
            </div>
            <button type="submit" class="auth-btn" [disabled]="loading">
                {{ loading ? 'Resetting...' : 'Reset Password' }}
            </button>
        </form>

        <div *ngIf="step === 4" class="auth-form">
            <button type="button" class="auth-btn" (click)="goToLogin()">Go to Login</button>
        </div>

        <div class="auth-divider">
            <span>OR</span>
        </div>

        <div class="auth-footer">
            <p>Remembered your password? <a routerLink="/login" class="auth-link">Log in</a></p>
        </div>
    </div>
</div>
