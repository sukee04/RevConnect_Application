<div *ngIf="loading" class="home-state">
    Loading Feed...
</div>

<div *ngIf="error" class="home-state error">
    {{ error }}
</div>

<div class="feed-column home-feed" *ngIf="!loading && !error">
    <!-- Stories Section -->
    <div class="glass-panel home-stories-panel">
        <div class="home-stories-row">

            <!-- Create Story Button -->
            <div class="story-container add-story-btn-container" (click)="handleOpenStoryCreate()">
                <div class="add-story-ring">
                    <img class="story-image"
                        [src]="user?.userProfile?.profilepicURL || user?.creatorProfile?.profilepicURL || user?.businessProfile?.logoUrl || '/assets/default-avatar.svg'"
                        alt="Me" />
                </div>
                <div class="add-story-plus">+</div>
                <span class="story-username">Add Story</span>
            </div>

            <div class="story-container" *ngFor="let bucket of storyUsers" (click)="handleOpenStoryView(bucket)">
                <div class="story-ring" [class.seen]="bucket.isSeen">
                    <img class="story-image"
                        [src]="bucket.userProfilePic || '/assets/default-avatar.svg'"
                        [alt]="bucket.username" />
                </div>
                <span class="story-username">{{ bucket.username }}</span>
            </div>

            <span *ngIf="stories.length === 0" class="home-stories-empty">
                Follow friends to see stories!
            </span>
        </div>
    </div>

    <!-- Posts Feed -->
    <ng-container *ngIf="posts.length > 0; else noPosts">
        <app-post-card *ngFor="let post of posts" [post]="post"></app-post-card>
    </ng-container>

    <ng-template #noPosts>
        <div class="home-state">
            <p>No posts yet. Start following people!</p>
        </div>
    </ng-template>

    <app-create-modal
        [isOpen]="isStoryModalOpen"
        [mode]="storyModalMode"
        [defaultCreateSubMode]="storyCreateDefaultSubMode"
        [activeStory]="activeStoryView"
        [activeStoryIndex]="storyQueueIndex"
        [storyCount]="storyQueue.length || 1"
        (onClose)="handleStoryModalClose()"
        (onStoryCreated)="fetchStoriesOnly()"
        (onViewStoryAdvance)="handleStoryAdvance()"
        (onViewStoryBack)="handleStoryBack()"
    ></app-create-modal>
</div>
