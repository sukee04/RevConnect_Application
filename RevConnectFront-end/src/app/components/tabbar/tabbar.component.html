<nav class="tab-bar">
    <div class="tab-list">

        <a routerLink="/home" routerLinkActive="active-tab" class="tab-item">
            <div class="tab-icon-container">
                <svg viewBox="0 0 24 24" fill="none" [attr.stroke]="'url(#hero-gradient)'" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" class="glowing-svg">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg>
            </div>
        </a>

        <a routerLink="/search" routerLinkActive="active-tab" class="tab-item">
            <div class="tab-icon-container">
                <svg viewBox="0 0 24 24" fill="none" [attr.stroke]="'url(#blue-gradient)'" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" class="glowing-svg">
                    <circle cx="11" cy="11" r="8" />
                    <line x1="21" y1="21" x2="16.65" y2="16.65" />
                </svg>
            </div>
        </a>

        <a routerLink="/explore" routerLinkActive="active-tab" class="tab-item">
            <div class="tab-icon-container">
                <svg viewBox="0 0 24 24" fill="none" [attr.stroke]="'url(#teal-gradient)'" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" class="glowing-svg">
                    <circle cx="12" cy="12" r="10" />
                    <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76" />
                </svg>
            </div>
        </a>

        <a *ngIf="isCreator || isBusiness" routerLink="/creator/marketplace" routerLinkActive="active-tab" class="tab-item">
            <div class="tab-icon-container">
                <svg viewBox="0 0 24 24" fill="none" [attr.stroke]="'url(#gold-gradient)'" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" class="glowing-svg">
                    <path d="M6 7h12l-1 13H7L6 7z" />
                    <path d="M9 9V6a3 3 0 0 1 6 0v3" />
                </svg>
            </div>
        </a>

        <a routerLink="/saved" routerLinkActive="active-tab" class="tab-item">
            <div class="tab-icon-container">
                <svg viewBox="0 0 24 24" fill="none" [attr.stroke]="'url(#teal-gradient)'" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" class="glowing-svg">
                    <path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z" />
                </svg>
            </div>
        </a>

        <a routerLink="/messages" routerLinkActive="active-tab" class="tab-item">
            <div class="tab-icon-container">
                <svg viewBox="0 0 24 24" fill="none" [attr.stroke]="'url(#blue-purple-gradient)'" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round" class="glowing-svg">
                    <path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z" />
                </svg>
                <div class="notification-badge-small" *ngIf="messageUnreadCount > 0">
                    {{ messageUnreadCount > 99 ? '99+' : messageUnreadCount }}
                </div>
            </div>
        </a>

        <a [routerLink]="profileRoute" routerLinkActive="active-tab" class="tab-item">
            <div class="profile-icon-small" style="overflow: hidden;">
                <img *ngIf="user?.userProfile?.profilepicURL || user?.creatorProfile?.profilepicURL || user?.businessProfile?.logoUrl"
                    [src]="user.userProfile?.profilepicURL || user.creatorProfile?.profilepicURL || user.businessProfile?.logoUrl"
                    [alt]="user.username" style="width: 100%; height: 100%; object-fit: cover;" />
                <svg *ngIf="!(user?.userProfile?.profilepicURL || user?.creatorProfile?.profilepicURL || user?.businessProfile?.logoUrl)"
                    viewBox="0 0 24 24" fill="none" stroke="rgba(230,230,240,0.9)" stroke-width="2.2"
                    stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%; padding: 4px;">
                    <circle cx="12" cy="8" r="4"></circle>
                    <path d="M4 20a8 8 0 0 1 16 0"></path>
                </svg>
            </div>
        </a>

    </div>
</nav>
