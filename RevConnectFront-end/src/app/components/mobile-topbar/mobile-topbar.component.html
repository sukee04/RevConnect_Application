<header class="mobile-topbar">
    <button class="topbar-icon-btn" type="button" (click)="onOpenCreateModal.emit()" aria-label="Create post">
        <svg viewBox="0 0 24 24" fill="none" stroke="#f3f4f6" stroke-width="2.9"
            stroke-linecap="round" stroke-linejoin="round" class="topbar-icon">
            <line x1="12" y1="5.5" x2="12" y2="18.5" />
            <line x1="5.5" y1="12" x2="18.5" y2="12" />
        </svg>
    </button>

    <a routerLink="/home" routerLinkActive="active-logo" class="mobile-logo logo-gradient-text">RevConnect</a>

    <div class="topbar-actions">
        <a routerLink="/notifications" routerLinkActive="active-end-icon" class="topbar-icon-btn" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" [attr.stroke]="'url(#red-gradient)'" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round" class="topbar-icon">
                <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
                <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
            </svg>
            <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount > 99 ? '99+' : unreadCount }}</span>
        </a>
        <a routerLink="/settings" routerLinkActive="active-end-icon" class="topbar-icon-btn" aria-label="Settings">
            <svg viewBox="0 0 24 24" fill="none" [attr.stroke]="'url(#silver-gradient)'" stroke-width="2.3"
                stroke-linecap="round" stroke-linejoin="round" class="topbar-icon">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
        </a>
    </div>
</header>
